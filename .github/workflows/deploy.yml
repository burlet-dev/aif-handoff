# CD aif-handoff: тесты → 2 параллельных образа (app + web) → SSH-деплой.
# Шаблон взят из educado (deploy-console.yml), адаптирован под Node-монорепо
# с двумя image (общий node-образ + лёгкий Angie-образ для статики).
#
# Триггеры:
#   pull_request → main : тесты-гейт (npm run lint/test/build).
#   push         → main : build → deploy. Покрывает И merge, И прямой push.
#   workflow_dispatch    : ручной запуск.
name: deploy

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".docker/**"
      - "docker-compose.yml"
      - "compose.production.yml"
      - "env/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".docker/**"
      - "docker-compose.yml"
      - "compose.production.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_APP: ghcr.io/burlet-dev/aif-handoff-app
  IMAGE_WEB: ghcr.io/burlet-dev/aif-handoff-web

jobs:
  # ---------- 1. ТЕСТЫ (gate перед сборкой/деплоем) ----------
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  # ---------- 2. СБОРКА (app + web параллельно) ----------
  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: app
            image: ghcr.io/burlet-dev/aif-handoff-app
          - target: web
            image: ghcr.io/burlet-dev/aif-handoff-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          sbom: true
          provenance: mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ matrix.image }}:${{ steps.meta.outputs.version }}
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # ---------- 3. ДЕПЛОЙ: SSH → расшифровка SOPS → up стека ----------
  # Цель: на сервере с уже установленным docker + sops + age-приватником один
  # workflow поднимает весь стек. Никаких плейнтекст-секретов на сервере.
  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-aif-prod
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG
          script: |
            set -e

            # Структура на сервере: ~/aif/ (контейнер-папка) → внутри сам репозиторий
            # repo/ и рядом projects/ (рабочие проекты) + data/ (SQLite).
            PROJECT="aif"
            REPO="burlet-dev/aif-handoff"
            BASE_DIR="$HOME/$PROJECT"        # ~/aif
            REPO_DIR="$BASE_DIR/repo"        # ~/aif/repo
            PROJECTS_DIR="$BASE_DIR/projects"
            DATA_DIR="$BASE_DIR/data"

            # Git-аутентификация эфемерным токеном раннера БЕЗ записи на диск.
            GIT_AUTH="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GHCR_TOKEN" | base64 | tr -d '\n')"

            # 1. Репозиторий: клон при первом разворачивании, иначе reset --hard.
            mkdir -p "$BASE_DIR"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git -c http.extraheader="$GIT_AUTH" clone "https://github.com/$REPO.git" "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git -c http.extraheader="$GIT_AUTH" fetch --prune origin main
            git reset --hard origin/main

            # 2. Расшифровка SOPS → env/aif.env.decrypted + .env (корневой).
            ./scripts/sops-decrypt.sh

            # 3. Папки для bind-mount: создаём ДО up (иначе Docker создаст от root).
            mkdir -p "$PROJECTS_DIR" "$DATA_DIR"

            # 4. Внешняя сеть Traefik (идемпотентно).
            docker network create proxy 2>/dev/null || true

            # 5. Логин в GHCR эфемерным токеном раннера (через stdin).
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            export IMAGE_TAG="$IMAGE_TAG"
            COMPOSE="docker compose -f docker-compose.yml -f compose.production.yml"

            # 6. Тянем свежие образы из GHCR.
            $COMPOSE pull

            # 7. Поднимаем весь стек. SQLite-миграции прогоняются автоматически в
            # api/agent при старте (см. packages/shared/src/db.ts runMigrations).
            $COMPOSE up -d --remove-orphans

            # 8. Снимаем логин — не оставляем кеш-креды на диске.
            docker logout ghcr.io || true
